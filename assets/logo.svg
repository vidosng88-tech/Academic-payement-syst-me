<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background circle -->
  <circle cx="150" cy="150" r="145" fill="#f8f9fa" stroke="#1a3a52" stroke-width="2"/>
  
  <!-- Outer decorative circle -->
  <circle cx="150" cy="150" r="135" fill="none" stroke="#2c5aa0" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Academic cap (mortarboard) -->
  <g id="cap">
    <!-- Cap top board -->
    <rect x="80" y="50" width="140" height="12" fill="#1a3a52" rx="2"/>
    <!-- Cap tassel -->
    <line x1="150" y1="62" x2="150" y2="95" stroke="#d4af37" stroke-width="3"/>
    <circle cx="150" cy="100" r="5" fill="#d4af37"/>
  </g>
  
  <!-- Book symbol (payment/education) -->
  <g id="book">
    <path d="M 90 110 L 90 170 Q 90 180 100 180 L 140 180 Q 150 180 150 170 L 150 110 Z" fill="#2c5aa0" opacity="0.8"/>
    <path d="M 150 110 L 150 170 Q 150 180 160 180 L 200 180 Q 210 180 210 170 L 210 110 Z" fill="#1a3a52"/>
    <!-- Book spine -->
    <line x1="150" y1="110" x2="150" y2="180" stroke="#f8f9fa" stroke-width="1"/>
    <!-- Book pages -->
    <line x1="100" y1="125" x2="140" y2="125" stroke="#f8f9fa" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="140" x2="140" y2="140" stroke="#f8f9fa" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="155" x2="140" y2="155" stroke="#f8f9fa" stroke-width="1" opacity="0.6"/>
    <line x1="160" y1="125" x2="200" y2="125" stroke="#f8f9fa" stroke-width="1" opacity="0.6"/>
    <line x1="160" y1="140" x2="200" y2="140" stroke="#f8f9fa" stroke-width="1" opacity="0.6"/>
    <line x1="160" y1="155" x2="200" y2="155" stroke="#f8f9fa" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Coins/Payment symbols -->
  <g id="coins">
    <!-- Left coin -->
    <circle cx="110" cy="210" r="18" fill="#d4af37" stroke="#b8860b" stroke-width="2"/>
    <circle cx="110" cy="210" r="12" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.5"/>
    <text x="110" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#b8860b">$</text>
    
    <!-- Right coin -->
    <circle cx="190" cy="210" r="18" fill="#d4af37" stroke="#b8860b" stroke-width="2"/>
    <circle cx="190" cy="210" r="12" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.5"/>
    <text x="190" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#b8860b">$</text>
  </g>
  
  <!-- Check mark (payment complete) -->
  <g id="checkmark">
    <circle cx="150" cy="225" r="20" fill="#2c5aa0" opacity="0.9"/>
    <path d="M 140 225 L 147 232 L 160 220" stroke="#f8f9fa" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="150" y="280" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a3a52" font-family="Arial, sans-serif">ACADEMIC PAYMENT</text>
</svg>
